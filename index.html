<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Test Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      text-align: center;
      padding: 80px;
    }

    button {
      padding: 20px 30px;
      font-size: 24px;
      border-radius: 12px;
      border: none;
      background: #6366f1;
      color: white;
      cursor: pointer;
    }

    #text {
      margin-top: 30px;
      font-size: 24px;
      color: #22c55e;
    }
  </style>
</head>

<body>
  <h1>JavaScript Test</h1>

  <button onclick="testButton()">Klick mich</button>

  <p id="text"></p>

  <script>
    alert("index.html JavaScript funktioniert");

    function testButton() {
      document.getElementById("text").innerText = "Der Button funktioniert!";
    }
  </script>
</body>
</html>
